<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PTSI Custody Ledger — Sistem Validasi Operasi Lintas Divisi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg-0:#0A0D10; --bg-1:#12171C; --bg-2:#171E24; --bg-3:#1D262D;
  --border:#262F37; --border-soft:#1C242B;
  --text-0:#ECF1F4; --text-1:#A8B3BB; --text-2:#69747C;
  --amber:#F0A63A; --amber-soft:#3A2E17; --amber-line:#5C4622;
  --teal:#3FC0AC; --teal-soft:#132C29;
  --green:#3BC988; --green-soft:#12271D;
  --red:#F0554C; --red-soft:#2B1614;
  --blue:#5B9BD5; --blue-soft:#14232F;
  --mono:'JetBrains Mono',monospace; --sans:'Inter',sans-serif; --display:'Syne',sans-serif;
  --radius:8px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg-0); color:var(--text-0); font-family:var(--sans);
  font-size:14px; line-height:1.5; -webkit-font-smoothing:antialiased;
}
::selection{background:var(--amber); color:#1a1305;}
a{color:inherit;}
button{font-family:inherit; cursor:pointer;}
input,select,textarea{font-family:inherit; font-size:13px;}
:focus-visible{outline:2px solid var(--amber); outline-offset:2px;}
::-webkit-scrollbar{width:10px; height:10px;}
::-webkit-scrollbar-track{background:var(--bg-1);}
::-webkit-scrollbar-thumb{background:var(--bg-3); border-radius:5px;}

/* ---------- Shell ---------- */
#shell{display:flex; min-height:100vh;}
#sidebar{
  width:252px; flex:none; background:var(--bg-1); border-right:1px solid var(--border-soft);
  display:flex; flex-direction:column; position:fixed; top:0; left:0; bottom:0; z-index:40;
  transition:transform .2s ease;
}
#content{margin-left:252px; flex:1; min-width:0; display:flex; flex-direction:column;}
.brand{padding:20px 18px 16px; border-bottom:1px solid var(--border-soft);}
.brand-mark{display:flex; align-items:center; gap:10px;}
.brand-badge{
  width:34px; height:34px; border-radius:7px; background:linear-gradient(155deg,var(--amber),#c97e1c);
  display:flex; align-items:center; justify-content:center; font-family:var(--display); font-weight:800;
  color:#1a1305; font-size:14px; flex:none;
}
.brand-text .brand-title{font-family:var(--display); font-weight:800; font-size:15px; letter-spacing:.02em;}
.brand-text .brand-sub{font-size:10.5px; color:var(--text-2); font-family:var(--mono); text-transform:uppercase; letter-spacing:.08em; margin-top:1px;}

.nav{flex:1; overflow-y:auto; padding:14px 10px;}
.nav-group{margin-bottom:16px;}
.nav-group-label{font-size:10px; text-transform:uppercase; letter-spacing:.09em; color:var(--text-2); font-family:var(--mono); padding:0 10px; margin-bottom:6px;}
.nav-item{
  display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:7px; color:var(--text-1);
  font-size:13.2px; font-weight:500; margin-bottom:2px; border:1px solid transparent; text-decoration:none;
}
.nav-item svg{flex:none; opacity:.85;}
.nav-item:hover{background:var(--bg-2); color:var(--text-0);}
.nav-item.active{background:var(--amber-soft); border-color:var(--amber-line); color:var(--amber);}
.nav-item.active svg{opacity:1;}
.nav-badge{margin-left:auto; font-family:var(--mono); font-size:10px; background:var(--bg-3); color:var(--text-1); padding:1px 6px; border-radius:20px;}

.sidebar-foot{border-top:1px solid var(--border-soft); padding:14px; background:var(--bg-1);}
.role-switch label{display:block; font-size:10px; text-transform:uppercase; letter-spacing:.08em; color:var(--text-2); font-family:var(--mono); margin-bottom:6px;}
.role-switch select{
  width:100%; background:var(--bg-2); border:1px solid var(--border); color:var(--text-0);
  padding:8px 9px; border-radius:6px; font-size:12.5px;
}
.role-meta{margin-top:9px; font-size:11px; color:var(--text-2); line-height:1.6;}
.role-meta b{color:var(--text-1); font-weight:600;}
.scope-pill{display:inline-block; margin-top:6px; font-family:var(--mono); font-size:10px; padding:2px 7px; border-radius:20px; background:var(--teal-soft); color:var(--teal); border:1px solid #1d4a44;}

/* ---------- Topbar ---------- */
#topbar{
  height:58px; flex:none; border-bottom:1px solid var(--border-soft); background:rgba(10,13,16,.85);
  backdrop-filter:blur(6px); display:flex; align-items:center; justify-content:space-between; padding:0 22px;
  position:sticky; top:0; z-index:30;
}
.crumb{display:flex; align-items:center; gap:8px; font-size:12px; color:var(--text-2); font-family:var(--mono);}
.crumb b{color:var(--text-0); font-weight:600;}
#menuToggle{display:none; background:none; border:1px solid var(--border); color:var(--text-1); border-radius:6px; padding:7px 9px; margin-right:8px;}
.topbar-right{display:flex; align-items:center; gap:14px;}
.clock{font-family:var(--mono); font-size:11.5px; color:var(--text-2);}
.user-chip{display:flex; align-items:center; gap:8px; background:var(--bg-2); border:1px solid var(--border); padding:6px 10px 6px 6px; border-radius:20px;}
.user-avatar{width:24px; height:24px; border-radius:50%; background:var(--teal-soft); color:var(--teal); display:flex; align-items:center; justify-content:center; font-size:10.5px; font-weight:700; font-family:var(--mono);}
.user-chip-name{font-size:12px; font-weight:600;}
.user-chip-role{font-size:10px; color:var(--text-2);}

/* ---------- Main ---------- */
#main{padding:24px 26px 60px; max-width:1400px; width:100%; margin:0 auto;}
.page-head{display:flex; align-items:flex-start; justify-content:space-between; gap:16px; margin-bottom:20px; flex-wrap:wrap;}
.page-title{font-family:var(--display); font-weight:700; font-size:22px; letter-spacing:.01em;}
.page-desc{color:var(--text-2); font-size:12.8px; margin-top:4px; max-width:560px;}
.page-actions{display:flex; gap:8px; flex-wrap:wrap;}

.btn{
  display:inline-flex; align-items:center; gap:7px; padding:9px 14px; border-radius:7px; font-size:12.8px;
  font-weight:600; border:1px solid var(--border); background:var(--bg-2); color:var(--text-0);
}
.btn:hover{background:var(--bg-3);}
.btn-primary{background:var(--amber); color:#1a1305; border-color:var(--amber);}
.btn-primary:hover{background:#f5b658;}
.btn-ghost{background:transparent;}
.btn-sm{padding:6px 10px; font-size:11.8px;}
.btn:disabled{opacity:.4; cursor:not-allowed;}

/* KPI cards */
.kpi-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:22px;}
.kpi-card{background:var(--bg-1); border:1px solid var(--border-soft); border-radius:var(--radius); padding:16px;}
.kpi-label{font-size:11px; color:var(--text-2); text-transform:uppercase; letter-spacing:.06em; font-family:var(--mono);}
.kpi-value{font-family:var(--display); font-size:26px; font-weight:700; margin-top:8px;}
.kpi-sub{font-size:11.5px; color:var(--text-2); margin-top:4px;}
.kpi-accent{width:26px; height:3px; border-radius:2px; margin-top:10px;}

.dash-grid{display:grid; grid-template-columns:1.4fr 1fr; gap:14px; align-items:start;}
@media(max-width:980px){.dash-grid{grid-template-columns:1fr;} .kpi-grid{grid-template-columns:repeat(2,1fr);}}

.panel{background:var(--bg-1); border:1px solid var(--border-soft); border-radius:var(--radius); overflow:hidden;}
.panel-head{padding:14px 16px; border-bottom:1px solid var(--border-soft); display:flex; align-items:center; justify-content:space-between;}
.panel-title{font-weight:700; font-size:13.5px;}
.panel-body{padding:4px 0;}
.activity-row{display:flex; gap:10px; padding:10px 16px; border-bottom:1px solid var(--border-soft); align-items:flex-start;}
.activity-row:last-child{border-bottom:none;}
.activity-dot{width:7px; height:7px; border-radius:50%; margin-top:6px; flex:none;}
.activity-text{font-size:12.3px;}
.activity-text b{font-weight:600;}
.activity-time{font-size:10.5px; color:var(--text-2); font-family:var(--mono); margin-top:2px;}
.followup-row{padding:11px 16px; border-bottom:1px solid var(--border-soft); font-size:12.3px;}
.followup-row:last-child{border-bottom:none;}
.followup-row .ff-title{font-weight:600; margin-bottom:2px;}
.followup-row .ff-meta{color:var(--text-2); font-size:11px;}
.empty-note{padding:22px 16px; text-align:center; color:var(--text-2); font-size:12.3px;}

/* Filter bar */
.filter-bar{display:flex; gap:8px; flex-wrap:wrap; align-items:flex-end; background:var(--bg-1); border:1px solid var(--border-soft); border-radius:var(--radius); padding:12px 14px; margin-bottom:14px;}
.filter-field{display:flex; flex-direction:column; gap:5px;}
.filter-field label{font-size:10px; text-transform:uppercase; letter-spacing:.06em; color:var(--text-2); font-family:var(--mono);}
.filter-field input,.filter-field select{background:var(--bg-2); border:1px solid var(--border); color:var(--text-0); padding:7px 9px; border-radius:6px; min-width:130px;}
.filter-field.grow{flex:1; min-width:180px;}
.filter-field.grow input{width:100%;}

/* Table */
.tbl-wrap{overflow-x:auto; background:var(--bg-1); border:1px solid var(--border-soft); border-radius:var(--radius);}
table{border-collapse:collapse; width:100%; min-width:760px;}
thead th{
  text-align:left; font-size:10.3px; text-transform:uppercase; letter-spacing:.05em; color:var(--text-2);
  font-family:var(--mono); padding:10px 12px; border-bottom:1px solid var(--border); white-space:nowrap; background:var(--bg-2);
  position:sticky; top:0;
}
tbody td{padding:11px 12px; border-bottom:1px solid var(--border-soft); font-size:12.6px; vertical-align:middle; white-space:nowrap;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover{background:var(--bg-2);}
td.wrap,th.wrap{white-space:normal;}
.mono{font-family:var(--mono); font-size:11.8px;}
.cell-sub{font-size:10.6px; color:var(--text-2); margin-top:2px;}

.badge{display:inline-flex; align-items:center; gap:5px; padding:3px 9px; border-radius:20px; font-size:11px; font-weight:600; font-family:var(--mono); white-space:nowrap;}
.badge-good{background:var(--green-soft); color:var(--green);}
.badge-reject{background:var(--red-soft); color:var(--red);}
.badge-pending{background:var(--blue-soft); color:var(--blue);}
.badge-draft{background:var(--bg-3); color:var(--text-1);}
.badge-progress{background:var(--amber-soft); color:var(--amber);}

.seal-chip{display:inline-flex; align-items:center; gap:5px; font-size:11px; font-family:var(--mono); font-weight:600;}
.seal-chip svg{flex:none;}
.seal-ok{color:var(--green);}
.seal-bad{color:var(--red);}

.sound-strip{display:flex; flex-direction:column; gap:3px; min-width:118px;}
.sound-track{position:relative; height:6px; background:var(--bg-3); border-radius:3px; overflow:hidden;}
.sound-fill{position:absolute; top:0; bottom:0; left:0; background:linear-gradient(90deg,var(--teal-soft),var(--teal)); border-radius:3px;}
.sound-labels{display:flex; justify-content:space-between; font-family:var(--mono); font-size:10px; color:var(--text-2);}

.empty-row td{text-align:center; color:var(--text-2); padding:34px 12px;}

/* Modal */
.overlay{position:fixed; inset:0; background:rgba(6,8,10,.62); backdrop-filter:blur(2px); display:flex; align-items:flex-start; justify-content:center; padding:40px 16px; z-index:100; overflow-y:auto;}
.modal{background:var(--bg-1); border:1px solid var(--border); border-radius:12px; width:100%; max-width:560px; overflow:hidden;}
.modal-head{padding:16px 20px; border-bottom:1px solid var(--border-soft); display:flex; align-items:center; justify-content:space-between;}
.modal-title{font-family:var(--display); font-weight:700; font-size:16px;}
.modal-close{background:none; border:none; color:var(--text-2); padding:4px;}
.modal-body{padding:18px 20px; max-height:70vh; overflow-y:auto;}
.form-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
.form-field{display:flex; flex-direction:column; gap:6px; margin-bottom:12px;}
.form-field.full{grid-column:1/-1;}
.form-field label{font-size:11.3px; font-weight:600; color:var(--text-1);}
.form-field input,.form-field select,.form-field textarea{background:var(--bg-2); border:1px solid var(--border); color:var(--text-0); padding:9px 10px; border-radius:6px; width:100%;}
.form-field .hint{font-size:10.5px; color:var(--text-2);}
.form-field .calc{font-family:var(--mono); font-size:12px; color:var(--teal); margin-top:2px;}
.modal-foot{padding:14px 20px; border-top:1px solid var(--border-soft); display:flex; justify-content:flex-end; gap:8px;}

.toast-wrap{position:fixed; bottom:20px; right:20px; z-index:200; display:flex; flex-direction:column; gap:8px;}
.toast{background:var(--bg-2); border:1px solid var(--border); border-left:3px solid var(--teal); padding:11px 16px; border-radius:7px; font-size:12.5px; box-shadow:0 8px 24px rgba(0,0,0,.4); min-width:220px;}

.info-strip{display:flex; gap:10px; align-items:flex-start; background:var(--teal-soft); border:1px solid #1d4a44; border-radius:8px; padding:12px 14px; margin-bottom:16px; font-size:12px; color:var(--text-1);}
.info-strip svg{flex:none; color:var(--teal); margin-top:1px;}

.master-tabs{display:flex; gap:6px; margin-bottom:14px; flex-wrap:wrap;}
.master-tab{padding:8px 13px; border-radius:7px; font-size:12px; font-weight:600; background:var(--bg-2); border:1px solid var(--border); color:var(--text-1);}
.master-tab.active{background:var(--amber-soft); border-color:var(--amber-line); color:var(--amber);}

.note-foot{margin-top:26px; padding-top:14px; border-top:1px solid var(--border-soft); font-size:11px; color:var(--text-2); display:flex; justify-content:space-between; flex-wrap:wrap; gap:8px;}

@media(max-width:900px){
  #sidebar{transform:translateX(-100%);}
  #sidebar.open{transform:translateX(0);}
  #content{margin-left:0;}
  #menuToggle{display:inline-flex;}
  .kpi-grid{grid-template-columns:1fr 1fr;}
  .form-grid{grid-template-columns:1fr;}
}
</style>
</head>

function fmtDate(iso,opts){
  if(!iso) return '—';
  const d = new Date(iso);

  const withTime = opts&&opts.time!==false;
  return d.toLocaleString('id-ID', withTime? {...base,hour:'2-digit',minute:'2-digit'} : base);
}
function fmtNum(n,dec=2){ if(n==null||isNaN(n)) return '—'; return Number(n).toLocaleString('id-ID',{minimumFractionDigits:dec,maximumFractionDigits:dec}); }

  if(role.scope==='all') return list;

function downloadCSV(filename, rows, columns){
  const header = columns.map(c=>c.label).join(',');
  const body = rows.map(r=>columns.map(c=>{
    let v = c.get(r);
    v = (v==null?'':String(v)).replace(/"/g,'""');
    return /[",\n]/.test(v) ? `"${v}"` : v;
  }).join(',')).join('\n');
  const blob = new Blob([header+'\n'+body], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=filename; a.click();
  URL.revokeObjectURL(url);
  toast('File CSV diunduh: '+filename);
}

function badge(text,type){ return `<span class="badge badge-${type}">${esc(text)}</span>`; }
function resultBadge(result){

function soundStrip(before,after,max=2400){
  if(before==null||after==null) return '<span class="cell-sub">—</span>';
  const pB = Math.min(100, (before/max)*100), pA = Math.min(100, (after/max)*100);
  return `<div class="sound-strip">
    <div class="sound-track"><div class="sound-fill" style="left:${Math.min(pB,pA)}%; width:${Math.abs(pA-pB)}%"></div></div>
    <div class="sound-labels"><span>${before}mm</span><span>→ ${after}mm</span></div>
  </div>`;
}

/* ---------------- Validation engine ---------------- */
function computeValidation(){
  const completedLoads = DB.loading.filter(l=>l.status==='Completed');
  return completedLoads.map(l=>{
    const rc = DB.receiving.find(r=>r.loadingId===l.id);
    const approval = DB.validationApprovals[l.id];
    if(!rc){
      return {loadingId:l.id, receivingId:null, load:l, rc:null, volLoad:l.volFlow, volRecv:null, varianceKl:null, variancePct:null, sealMatch:null, status:'Pending', approval};
    }
    const sealMatch = rc.seal === l.seal;
    const varianceKl = +(rc.volFlow - l.volFlow).toFixed(2);
    const variancePct = +((varianceKl/l.volFlow)*100).toFixed(2);
    let status = 'Matched';
    if(!sealMatch) status='Discrepancy';
    else if(Math.abs(variancePct) > 0.5) status='Discrepancy';
    return {loadingId:l.id, receivingId:rc.id, load:l, rc, volLoad:l.volFlow, volRecv:rc.volFlow, varianceKl, variancePct, sealMatch, status, approval};
  });
}

function filterBar(moduleKey, fields, onChange){
  const f = state.filters[moduleKey] || (state.filters[moduleKey]={});
  const html = `<div class="filter-bar">
    ${fields.map(fl=>{
      if(fl.type==='search'){
        return `<div class="filter-field grow"><label>${esc(fl.label)}</label><input type="text" data-f="${fl.key}" value="${esc(f[fl.key]||'')}" placeholder="${esc(fl.placeholder||'Cari...')}"></div>`;
      }
      if(fl.type==='date'){
        return `<div class="filter-field"><label>${esc(fl.label)}</label><input type="date" data-f="${fl.key}" value="${esc(f[fl.key]||'')}"></div>`;
      }
      if(fl.type==='select'){
        return `<div class="filter-field"><label>${esc(fl.label)}</label><select data-f="${fl.key}">
          <option value="">Semua</option>
          ${fl.options.map(o=>`<option value="${esc(o)}" ${f[fl.key]===o?'selected':''}>${esc(o)}</option>`).join('')}
        </select></div>`;
      }
      return '';
    }).join('')}
    <button class="btn btn-sm btn-ghost" id="filterReset">${icon('filter',14)} Reset</button>
  </div>`;
  setTimeout(()=>{
    document.querySelectorAll('[data-f]').forEach(el=>{
      el.addEventListener('input', ()=>{ f[el.getAttribute('data-f')] = el.value; onChange(); });
      el.addEventListener('change', ()=>{ f[el.getAttribute('data-f')] = el.value; onChange(); });
    });
    const rb = document.getElementById('filterReset');
    if(rb) rb.addEventListener('click', ()=>{ state.filters[moduleKey]={}; onChange(); });
  },0);
  return html;
}
function applyDateFilter(list, f, dateField){
  return list.filter(r=>{
    const val = r[dateField]; if(!val) return true;
    const day = val.slice(0,10);
    if(f.from && day < f.from) return false;
    if(f.to && day > f.to) return false;
    return true;
  });
}
function applySearch(list, f, fields){
  if(!f.q) return list;
  const q = f.q.toLowerCase();
  return list.filter(r=>fields.some(fn=>String(fn(r)||'').toLowerCase().includes(q)));
}

  const rejects = filterByScope(DB.inspectionPre).filter(r=>r.result==='Reject' && r.dt.slice(0,7)===thisMonth).length
                + filterByScope(DB.inspectionAfter).filter(r=>r.result==='Reject' && (r.dt||'').slice(0,7)===thisMonth).length;
  const valAll = computeValidation();
  const discrepancy = valAll.filter(v=>v.status==='Discrepancy').length;

  const kpis = [
    {label:'Loading Hari Ini', value:loadToday, sub:'17 Jul 2026', color:'var(--amber)'},
    {label:'Receiving Hari Ini', value:recvToday, sub:'17 Jul 2026', color:'var(--teal)'},
    {label:'Inspeksi Reject', value:rejects, sub:'Bulan berjalan', color:'var(--red)'},
    {label:'Validasi Discrepancy', value:discrepancy, sub:'Perlu tindak lanjut', color:'var(--blue)'},
  ];

  // Recent activity merge
  const acts = [];
  DB.inspectionPre.forEach(r=>acts.push({dt:r.dt, text:`Inspeksi pre-loading unit <b>${unitById(r.unit).plate}</b>`, status:r.result}));
  DB.loading.forEach(r=>acts.push({dt:r.dtStart, text:`Loading <b>${r.id}</b> — ${unitById(r.unit).plate}`, status:r.status}));
  DB.receiving.forEach(r=>acts.push({dt:r.dt, text:`Receiving <b>${r.id}</b> ref. ${r.loadingId}`, status:'Completed'}));
  DB.discharge.forEach(r=>acts.push({dt:r.dtStart, text:`Discharge <b>${r.id}</b> — ${vesselById(r.vessel).name}`, status:r.status}));
  DB.shipLoading.forEach(r=>acts.push({dt:r.dtStart, text:`Loading kapal <b>${r.id}</b> — ${vesselById(r.vessel).name}`, status:r.status}));
  acts.sort((a,b)=> new Date(b.dt) - new Date(a.dt));
  const dotColor = s=> s==='Reject'?'var(--red)': s==='Draft'||s==='In Progress'?'var(--amber)':'var(--green)';

  // Follow-ups
  const followups = [];
  DB.inspectionPre.filter(r=>r.result==='Reject').forEach(r=>followups.push({title:`Unit ${unitById(r.unit).plate} — inspeksi pre-loading ditolak`, meta:`${r.reason} · ${fmtDate(r.dt)}`}));
  DB.inspectionAfter.filter(r=>r.result==='Reject').forEach(r=>followups.push({title:`Loading ${r.loadingId} — inspeksi after-loading ditolak`, meta:`${r.remarks} · ${fmtDate(r.dt)}`}));
  valAll.filter(v=>v.status==='Discrepancy').forEach(v=>followups.push({title:`Discrepancy volume — ${v.loadingId} vs ${v.receivingId}`, meta: v.sealMatch===false ? 'Nomor seal tidak cocok' : `Selisih volume ${fmtNum(v.variancePct,2)}%`}));

  document.getElementById('main').innerHTML = `
    <div class="page-head">
      <div>
        <div class="page-title">Dashboard Operasi</div>
        <div class="page-desc">Ringkasan lintas divisi — data ditampilkan sesuai lingkup akses peran Anda saat ini.</div>
      </div>
    </div>
    <div class="kpi-grid">
      ${kpis.map(k=>`<div class="kpi-card"><div class="kpi-label">${esc(k.label)}</div><div class="kpi-value">${k.value}</div><div class="kpi-sub">${esc(k.sub)}</div><div class="kpi-accent" style="background:${k.color}"></div></div>`).join('')}
    </div>
    <div class="dash-grid">
      <div class="panel">
        <div class="panel-head"><div class="panel-title">Aktivitas Terbaru</div></div>
        <div class="panel-body">
          ${acts.slice(0,8).map(a=>`<div class="activity-row"><div class="activity-dot" style="background:${dotColor(a.status)}"></div><div><div class="activity-text">${a.text}</div><div class="activity-time">${fmtDate(a.dt)}</div></div></div>`).join('') || '<div class="empty-note">Belum ada aktivitas.</div>'}
        </div>
      </div>
      <div class="panel">
        <div class="panel-head"><div class="panel-title">Perlu Tindak Lanjut</div></div>
        <div class="panel-body">
          ${followups.slice(0,8).map(f=>`<div class="followup-row"><div class="ff-title">${esc(f.title)}</div><div class="ff-meta">${esc(f.meta)}</div></div>`).join('') || '<div class="empty-note">Tidak ada item terbuka. Semua beres.</div>'}
        </div>
      </div>
    </div>
    <div class="note-foot">
      <span>Lingkup data: <b>${esc(ROLE_CONFIG[state.role].label)}</b> · ${esc({own:'hanya data sendiri',department:'satu departemen',business_unit:'satu business unit',cross_validation:'cross-divisi (pasangan transaksi)',all:'seluruh organisasi'}[currentRole().scope])}</span>
      <span>Data demo tersimpan sementara di sesi ini — reload halaman akan mengembalikan ke data awal.</span>
    </div>
  `;
}

function formLoading(){
  const uOpts = UNITS.map(u=>`<option value="${u.id}">${esc(u.plate)}</option>`).join('');
  const tOpts = TANKS.filter(t=>t.location==='Terminal Balikpapan').map(t=>`<option value="${t.id}" data-factor="0.42">${esc(t.name)} — ${esc(productById(t.product).name)}</option>`).join('');

      <div class="form-field"><label>Unit</label><select name="unit" required>${uOpts}</select></div>

      <div class="form-field"><label>Sounding Sebelum (mm)</label><input type="number" name="sBefore" id="ldBefore" required value="1500"></div>
      <div class="form-field"><label>Sounding Sesudah (mm)</label><input type="number" name="sAfter" id="ldAfter" required value="1540"></div>
      <div class="form-field"><label>Flowmeter Start (L)</label><input type="number" name="fmStart" required value="500000"></div>
      <div class="form-field"><label>Flowmeter End (L)</label><input type="number" name="fmEnd" id="ldFmEnd" required value="516000"></div>
      <div class="form-field"><label>No. Seal</label><input type="text" name="seal" required placeholder="SL-4xxxx"></div>
      <div class="form-field"><label>Tujuan</label><input type="text" name="dest" required value="Depot Samarinda"></div>

      <div class="form-field"><label>Selesai</label><input type="datetime-local" name="dtEnd" required value="2026-07-17T10:35"></div>
      <div class="form-field"><label>Status</label><select name="status" required><option value="Completed">Completed</option><option value="Draft">Draft</option></select></div>
      <div class="form-field full"><div class="calc" id="ldCalc">Vol. sounding (estimasi): —</div></div>
    </div>
  `, data=>{
    const factor = 0.42;
    const volSound = +(( +data.sAfter - +data.sBefore) * factor).toFixed(2);
    const volFlow = +(((+data.fmEnd) - (+data.fmStart))/1000).toFixed(2);
    const id = 'LD-'+String(state.idSeq.ld++).padStart(3,'0');
    DB.loading.push({id, unit:data.unit, tank:data.tank, dtStart:data.dtStart, dtEnd:data.dtEnd, dest:data.dest,
      sBefore:+data.sBefore, sAfter:+data.sAfter, volSound, volFlow, fmStart:+data.fmStart, fmEnd:+data.fmEnd,

    toast('Loading '+id+' tersimpan.');
    renderLoading();
  });
  setTimeout(()=>{
    const calc = document.getElementById('ldCalc');
    const update = ()=>{
      const b = +document.getElementById('ldBefore').value, a = +document.getElementById('ldAfter').value;
      calc.textContent = 'Vol. sounding (estimasi): ' + fmtNum((a-b)*0.42) + ' KL';
    };
    document.getElementById('ldBefore').addEventListener('input', update);
    document.getElementById('ldAfter').addEventListener('input', update);
    update();
  },0);
}

      <div class="form-field"><label>Sounding Sesudah (mm)</label><input type="number" name="sAfter" required value="1040"></div>
      <div class="form-field"><label>Flowmeter Diterima (KL)</label><input type="number" step="0.01" name="volFlow" required></div>
      <div class="form-field"><label>No. Seal Diterima</label><input type="text" name="seal" required placeholder="Cocokkan dengan seal loading"></div>
    </div>
  `, data=>{
    if(!data.loadingId){ toast('Tidak ada loading yang bisa direceiving.'); return; }
    const volSound = +((+data.sAfter - +data.sBefore) * 0.35).toFixed(2);
    const id = 'RC-'+String(state.idSeq.rc++).padStart(3,'0');
    DB.receiving.push({id, loadingId:data.loadingId, tank:data.tank, dt:data.dt, sBefore:+data.sBefore, sAfter:+data.sAfter,
      volSound, volFlow:+data.volFlow, seal:data.seal, receiver:currentUser().email, dept:currentUser().dept, bu:currentUser().bu});
    toast('Receiving '+id+' tersimpan — cek halaman Validasi Volume.');
    renderReceiving();
  });
}

/* ---------------- Validation ---------------- */
function renderValidation(){
  const f = state.filters.validation || (state.filters.validation={});
  let rows = computeValidation();
  rows = rows.filter(v=>{
    const user = currentUser(), role = currentRole();
    if(role.scope==='all') return true;
    if(role.scope==='business_unit') return v.load.bu===user.bu;
    if(role.scope==='department') return v.load.dept===user.dept || (v.rc && v.rc.dept===user.dept);
    return true;
  });
  if(f.status) rows = rows.filter(r=>r.status===f.status);
  rows = applySearch(rows, f, [r=>r.loadingId, r=>r.receivingId]);
  rows.sort((a,b)=>new Date(b.load.dtStart)-new Date(a.load.dtStart));
  const canApprove = currentRole().canApprove;

  document.getElementById('main').innerHTML = `
    <div class="info-strip">${icon('scale',16)}<div>Perbandingan dihitung otomatis dari pasangan transaksi Loading ↔ Receiving. Toleransi selisih volume: <b>±0,5%</b>; seal harus cocok persis.</div></div>
    <div class="page-head">
      <div><div class="page-title">Validasi Volume Loading vs Receiving</div><div class="page-desc">Pencocokan seal, sounding, dan volume flowmeter lintas divisi.</div></div>
      <div class="page-actions"><button class="btn btn-sm" id="btnExport">${icon('download',14)} Export CSV</button></div>
    </div>
    <div id="filterSlot"></div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>Loading</th><th>Receiving</th><th>Vol. Loading</th><th>Vol. Receiving</th><th>Selisih</th><th>Seal</th><th>Status</th><th>Validator</th>${canApprove?'<th>Aksi</th>':''}</tr></thead>
      <tbody>
        ${rows.length? rows.map(v=>`<tr>
            <td class="mono">${v.loadingId}</td>
            <td class="mono">${v.receivingId||'<span class="cell-sub">menunggu</span>'}</td>
            <td class="mono">${fmtNum(v.volLoad)} KL</td>
            <td class="mono">${v.volRecv!=null? fmtNum(v.volRecv)+' KL':'—'}</td>
            <td class="mono" style="color:${v.variancePct==null?'inherit':(Math.abs(v.variancePct)>0.5?'var(--red)':'var(--green)')}">${v.variancePct!=null? (v.variancePct>0?'+':'')+fmtNum(v.variancePct,2)+'%':'—'}</td>
            <td>${v.sealMatch==null? '<span class="cell-sub">—</span>' : sealChip(v.sealMatch)}</td>
            <td>${statusBadge(v.status)}</td>
            <td>${v.approval? esc(findUser(v.approval.by).name)+`<div class="cell-sub">${fmtDate(v.approval.at)}</div>` : '<span class="cell-sub">Belum divalidasi</span>'}</td>
            ${canApprove? `<td>${v.status!=='Pending' && !v.approval ? `<button class="btn btn-sm" data-approve="${v.loadingId}">${icon('check',13)} Approve</button>` : ''}</td>`:''}
          </tr>`).join('') : `<tr class="empty-row"><td colspan="9">Tidak ada data yang cocok dengan filter.</td></tr>`}
      </tbody>
    </table></div>
  `;
  document.getElementById('filterSlot').innerHTML = filterBar('validation', [
    {key:'q', type:'search', label:'Cari', placeholder:'ID loading / receiving'},
    {key:'status', type:'select', label:'Status', options:['Matched','Discrepancy','Pending']},
  ], renderValidation);
  document.getElementById('btnExport').addEventListener('click', ()=>{
    downloadCSV('validasi-volume.csv', rows, [
      {label:'Loading', get:r=>r.loadingId},{label:'Receiving', get:r=>r.receivingId},
      {label:'Vol Loading', get:r=>r.volLoad},{label:'Vol Receiving', get:r=>r.volRecv},
      {label:'Selisih %', get:r=>r.variancePct},{label:'Seal Cocok', get:r=>r.sealMatch},{label:'Status', get:r=>r.status},
    ]);
  });
  if(canApprove){
    document.querySelectorAll('[data-approve]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const lid = btn.getAttribute('data-approve');
        DB.validationApprovals[lid] = {by:currentUser().email, at:'2026-07-17T'+String(9+Math.floor(Math.random()*3)).padStart(2,'0')+':15', remarks:''};
        toast('Validasi '+lid+' disetujui.');
        renderValidation();
      });
    });
  }
}

/* ---------------- Master Data ---------------- */
let masterTab = 'users';
function renderMaster(){
  const tabs = [
    {key:'users', label:'Users & Role'},
    {key:'units', label:'Units'},
    {key:'vessels', label:'Vessels'},
    {key:'tanks', label:'Tanks'},
    {key:'permissions', label:'Role Permission'},
  ];
  let body = '';
  if(masterTab==='users'){
    body = `<div class="tbl-wrap"><table><thead><tr><th>Nama</th><th>Email</th><th>Role</th><th>Departemen</th><th>Business Unit</th></tr></thead><tbody>
      ${USERS.map(u=>`<tr><td>${esc(u.name)}</td><td class="mono">${esc(u.email)}</td><td>${esc(ROLE_CONFIG[u.role].label)}</td><td>${esc(deptById(u.dept).name)}</td><td>${u.bu? esc(buById(u.bu).name):'Semua BU'}</td></tr>`).join('')}
    </tbody></table></div>`;
  } else if(masterTab==='units'){
    body = `<div class="tbl-wrap"><table><thead><tr><th>Plat</th><th>Tipe</th><th>Kapasitas</th><th>Pemilik</th></tr></thead><tbody>
      ${UNITS.map(u=>`<tr><td class="mono">${esc(u.plate)}</td><td>${esc(u.type)}</td><td class="mono">${fmtNum(u.cap,0)} L</td><td>${esc(u.owner)}</td></tr>`).join('')}
    </tbody></table></div>`;
  } else if(masterTab==='vessels'){
    body = `<div class="tbl-wrap"><table><thead><tr><th>Nama Vessel</th><th>IMO</th><th>Kapasitas</th></tr></thead><tbody>
      ${VESSELS.map(v=>`<tr><td>${esc(v.name)}</td><td class="mono">${esc(v.imo)}</td><td class="mono">${fmtNum(v.cap,0)} KL</td></tr>`).join('')}
    </tbody></table></div>`;
  } else if(masterTab==='tanks'){
    body = `<div class="tbl-wrap"><table><thead><tr><th>Tangki</th><th>Lokasi</th><th>Produk</th><th>Kapasitas</th></tr></thead><tbody>
      ${TANKS.map(t=>`<tr><td class="mono">${esc(t.name)}</td><td>${esc(t.location)}</td><td>${esc(productById(t.product).name)}</td><td class="mono">${fmtNum(t.cap,0)} KL</td></tr>`).join('')}
    </tbody></table></div>`;
  } else if(masterTab==='permissions'){
    body = `<div class="tbl-wrap"><table><thead><tr><th>Role</th><th class="wrap">Modul Dapat Diakses</th><th>Lingkup Data</th><th>Buat Data</th><th>Approve</th></tr></thead><tbody>
      ${Object.keys(ROLE_CONFIG).map(k=>{
        const r = ROLE_CONFIG[k];
        return `<tr><td>${esc(r.label)}</td><td class="wrap mono" style="font-size:11px">${r.modules.filter(m=>m!=='dashboard').join(', ')||'—'}</td><td>${esc(r.scope)}</td><td>${r.canCreate?icon('check',14):'—'}</td><td>${r.canApprove?icon('check',14):'—'}</td></tr>`;
      }).join('')}
    </tbody></table></div>`;
  }
  document.getElementById('main').innerHTML = `
    <div class="page-head"><div><div class="page-title">Master Data &amp; Konfigurasi Role</div><div class="page-desc">Referensi data induk dan matriks hak akses lintas divisi.</div></div></div>
    <div class="master-tabs">${tabs.map(t=>`<button class="master-tab ${masterTab===t.key?'active':''}" data-tab="${t.key}">${esc(t.label)}</button>`).join('')}</div>
    ${body}
  `;
  document.querySelectorAll('[data-tab]').forEach(b=>b.addEventListener('click', ()=>{ masterTab=b.getAttribute('data-tab'); renderMaster(); }));
}

/* ---------------- Router ---------------- */
function renderMain(){
  if(!hasAccess(state.module)) state.module='dashboard';
  const map = {
    dashboard:renderDashboard, inspection_pre:renderInspectionPre, inspection_after:renderInspectionAfter,
    loading:renderLoading, receiving:renderReceiving, validation:renderValidation,
    discharge:renderDischarge, ship_loading:renderShipLoading, master:renderMaster,
  };
  (map[state.module]||renderDashboard)();
}

/* ---------------- Init ---------------- */
function init(){
  renderSidebar();
  renderTopbar();
  renderMain();
}
init();
